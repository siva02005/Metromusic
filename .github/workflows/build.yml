name: Build All Platforms

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: metromusic-android
          path: app/build/outputs/apk/debug/app-debug.apk

  build-desktop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Desktop JAR
        run: gradle :desktopApp:packageUberJarForCurrentOS --no-daemon

      - name: Upload Desktop JAR
        uses: actions/upload-artifact@v4
        with:
          name: metromusic-desktop
          path: desktopApp/build/compose/jars/*.jar

  create-release:
    needs: [build-android, build-desktop]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: metromusic-android
          path: ./artifacts

      - name: Download Desktop JAR
        uses: actions/download-artifact@v4
        with:
          name: metromusic-desktop
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: Metromusic v1.0.0
          body: |
            ## Metromusic v1.0.0

            Open-source music player for **Android** and **Windows/Desktop**.

            ### Downloads
            - **Android:** Install `app-debug.apk` on your Android device
            - **Desktop:** Run `java -jar metromusic-desktop.jar` on Windows/Linux/Mac

            ### Features
            - Global music catalog via Piped API
            - 200% Volume Boost with speaker protection
            - JBL Sound Stage & Dolby Atmos spatial audio
            - FriendsZone zero-connectivity multi-device sync
            - Material You dynamic theming
          files: |
            artifacts/app-debug.apk
            artifacts/*.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
